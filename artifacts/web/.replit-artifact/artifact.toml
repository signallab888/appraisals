kind = "web"
previewPath = "/"
title = "Commercial Appraiser FL"
version = "1.0.0"
id = "artifacts/web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22333

[services.development]
run = "pnpm --filter @workspace/web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/web", "run", "build" ]
publicDir = "artifacts/web/dist/public"
serve = "static"

[services.env]
PORT = "22333"
